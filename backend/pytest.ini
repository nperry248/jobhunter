[pytest]
# ── pytest-asyncio mode ──────────────────────────────────────────────────────
# "auto" means every async test function is automatically treated as async
# without needing @pytest.mark.asyncio on every single test.
# (We still use the decorator on classes for clarity, but it's optional with auto mode.)
asyncio_mode = auto
# Use session scope for async fixtures so they share one event loop
# This replaces the old custom event_loop fixture that is deprecated in pytest-asyncio 0.23+

# ── Test discovery ────────────────────────────────────────────────────────────
# Where to look for tests
testpaths = tests

# ── Output ────────────────────────────────────────────────────────────────────
# -v: verbose (show each test name and pass/fail)
# -s: don't capture stdout (so print() statements show up)
addopts = -v --tb=short

# ── Warnings ─────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning:langchain.*:
    ignore::DeprecationWarning:pydantic.*:
